name: Build

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Configure CMake
        run: cmake -S . -B build -G "Xcode"

      - name: Build
        run: cmake --build build --config Release

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config \
            libasound2-dev libpulse-dev libjack-dev libsndio-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libfribidi-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev \
            libcurl4-openssl-dev libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm install

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja  -DNAPI_JAVASCRIPT_ENGINE=JavaScriptCore

      - name: Build
        run: cmake --build build
